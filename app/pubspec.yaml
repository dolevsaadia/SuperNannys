name: super_nanny
description: SuperNanny — Babysitter Marketplace
publish_to: 'none'
version: 1.4.0+5

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.3+1

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # UI / Design
  # google_fonts removed — Heebo is bundled as variable font in assets/fonts/
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  intl: ^0.19.0
  timeago: ^3.6.1

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Auth
  google_sign_in: ^6.2.1

  # Real-time Chat
  socket_io_client: ^2.0.3+1

  # Image
  image_picker: ^1.1.1

  # Location
  geolocator: ^11.0.0
  geocoding: ^4.0.0

  # Notifications
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

  # Misc
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  uuid: ^4.4.0
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1
  # flutter_native_splash removed — incompatible with Flutter 3.41 UIScene lifecycle.
  # Splash assets (LaunchScreen.storyboard + LaunchImage) are already generated.

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/brand/
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Heebo
      fonts:
        - asset: assets/fonts/Heebo[wght].ttf


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/brand/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: false

# flutter_native_splash config removed (plugin no longer in use)
